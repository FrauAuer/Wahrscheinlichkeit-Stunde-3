<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wie oft ziehst du welche Farbe?</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --card: #ffffff;
      --border: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      margin-bottom: 16px;
    }
    h1, h2, h3 { margin-top: 0; }
    .row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: end;
    }
    .field { min-width: 240px; flex: 1; }
    label { display: block; margin-bottom: 6px; font-weight: 700; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 1rem;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-top: 20px;
    }
    .chart-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: #f9fafb;
    }
    .chart-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .chart {
      height: 360px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 24px;
      padding: 16px 8px 8px;
      border-bottom: 2px solid #111827;
    }
    .bar-wrap {
      flex: 0 1 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: end;
      gap: 8px;
    }
    .bar-value { font-weight: 700; }
    .bar {
      width: 100%;
      border-radius: 12px 12px 0 0;
    }
    .bar.blue { background: linear-gradient(180deg, #60a5fa, #2563eb); }
    .bar.yellow { background: linear-gradient(180deg, #fde047, #eab308); }
    .bar-label { font-weight: 700; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
    }

    thead th { text-align: center; }
    tbody td:first-child,
    thead th:first-child { text-align: left; }

    /* ALLE Zahlen-Spalten explizit zentrieren */
    tbody td:nth-child(2),
    tbody td:nth-child(3),
    tbody td:nth-child(4),
    tbody td:nth-child(5) {
      text-align: center;
    }

    /* Trennlinie korrekt */
    thead tr:first-child th:nth-child(3),
    thead tr:nth-child(2) th:nth-child(3),
    tbody td:nth-child(4) {
      border-left: 2px solid #111827;
    }

    .small { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Wie oft ziehst du welche Farbe?</h1>
      <div class="row">
        <div class="field">
          <label for="lessonCode">Passwort</label>
          <input id="lessonCode" type="text" placeholder="33" />
        </div>
        <div>
          <button id="loadBtn">anzeigen</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Unsere Ergebnisse als Säulendiagramme</h2>
      <div class="charts-grid">
        <div class="chart-box">
          <div class="chart-title">Beutel 1</div>
          <div class="chart" id="chartBag1"></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">Beutel 2</div>
          <div class="chart" id="chartBag2"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Ergebnisse der Gruppen</h2>
      <table>
        <colgroup>
          <col style="width: 38%;">
          <col style="width: 15.5%;">
          <col style="width: 15.5%;">
          <col style="width: 15.5%;">
          <col style="width: 15.5%;">
        </colgroup>
        <thead>
          <tr>
            <th rowspan="2">Gruppennummer</th>
            <th colspan="2">Beutel 1</th>
            <th colspan="2">Beutel 2</th>
          </tr>
          <tr>
            <th>Blau</th>
            <th>Gelb</th>
            <th>Blau</th>
            <th>Gelb</th>
          </tr>
        </thead>
        <tbody id="groupsBody"></tbody>
      </table>
      <p class="small" id="emptyText">Noch keine Eingaben vorhanden.</p>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { ref, onValue } from 'https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js';

    const loadBtn = document.getElementById('loadBtn');
    const groupsBody = document.getElementById('groupsBody');
    const emptyText = document.getElementById('emptyText');
    const lessonCodeInput = document.getElementById('lessonCode');

    function renderTable(groups) {
      groupsBody.innerHTML = '';
      emptyText.style.display = groups.length ? 'none' : 'block';

      groups.forEach(group => {
        const tr = document.createElement('tr');
        const c = group.counts || {};
        tr.innerHTML = `
          <td>${group.groupName || '-'}</td>
          <td>${c['1'] || 0}</td>
          <td>${c['2'] || 0}</td>
          <td>${c['3'] || 0}</td>
          <td>${c['4'] || 0}</td>
        `;
        groupsBody.appendChild(tr);
      });
    }

    loadBtn.addEventListener('click', () => {
      const code = lessonCodeInput.value.trim().toLowerCase();
      if (!code) return;

      onValue(ref(db, `Stunde3/${code}/groups`), snap => {
        const data = snap.val() || {};
        renderTable(Object.values(data));
      });
    });
  </script>
</body>
</html>
